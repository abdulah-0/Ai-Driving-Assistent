name: ai_driving_assistant
description: An AI-Based Driving Assistant Mobile Application.

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^13.0.0
  permission_handler: ^11.3.0
  flutter_tts: ^4.2.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  camera: ^0.10.6
  google_mlkit_face_detection: ^0.12.0
  audioplayers: ^6.1.0
  provider: ^6.1.2
  http: ^1.2.1
  google_fonts: ^6.2.1
  url_launcher: ^6.3.0
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
